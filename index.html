<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reparto Yogur Griego - Junín</title>
    
    <meta name="theme-color" content="#1d4ed8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2921/2921820.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --safe-top: env(safe-area-inset-top); }
        body { -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
        #map { height: 35vh; width: 100%; border-radius: 1.25rem; z-index: 1; }
        .app-container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .content-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

    <div class="app-container">
        <header class="bg-blue-700 text-white p-4 pt-6 shadow-md shrink-0">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-lg font-bold">Yogur Griego Junín</h1>
                    <p class="text-[9px] opacity-70 uppercase tracking-widest font-semibold">Logística con Agenda</p>
                </div>
                <button id="install-btn" class="hidden bg-white text-blue-700 text-[10px] px-3 py-1.5 rounded-full font-bold">INSTALAR</button>
            </div>
        </header>

        <div class="content-scroll">
            <div class="max-w-xl mx-auto p-4 space-y-4 pb-28">
                
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 space-y-3">
                    <div class="space-y-2">
                        <div class="relative">
                            <input type="text" id="address-input" list="client-suggestions" autocomplete="off" placeholder="Dirección (ej: Saavedra 123)" 
                                   class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                   oninput="checkClientPhone(this.value)">
                            <datalist id="client-suggestions"></datalist>
                        </div>
                        
                        <div class="flex gap-2">
                            <input type="tel" id="phone-input" placeholder="WhatsApp (se guarda solo)" 
                                   class="flex-1 px-4 py-3 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <button onclick="searchAddress()" class="bg-blue-600 text-white px-5 rounded-xl shadow-lg active:scale-90 transition-transform">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setSearchAsOrigin()" class="flex-1 bg-slate-100 text-slate-700 py-2.5 rounded-lg text-[10px] font-bold uppercase">Setear Inicio</button>
                        <button onclick="optimizeRoute()" class="flex-1 bg-green-600 text-white py-2.5 rounded-lg text-[10px] font-bold uppercase shadow-md active:scale-95">Optimizar Ruta</button>
                    </div>
                </div>

                <div id="origin-box" class="hidden bg-blue-50 border border-blue-100 p-3 rounded-xl flex items-center justify-between animate-fade-in">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <div class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></div>
                        <span id="origin-display-text" class="text-xs font-bold text-blue-800 truncate">Inicio: Seleccionado</span>
                    </div>
                    <button onclick="clearOrigin()" class="text-blue-400 hover:text-red-500 p-1">✕</button>
                </div>

                <div id="map" class="shadow-md border-2 border-white"></div>

                <div id="distance-info" class="hidden bg-slate-900 text-white p-4 rounded-2xl flex items-center justify-between animate-fade-in">
                    <div>
                        <p class="text-[9px] opacity-60 font-bold uppercase">Ruta Optimizada</p>
                        <p id="total-distance" class="text-xl font-black">0.00 km</p>
                    </div>
                    <button onclick="openInGoogleMaps()" class="bg-blue-600 px-4 py-2 rounded-xl font-bold text-xs shadow-lg flex items-center gap-2">
                        ABRIR GPS
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-slate-800 text-sm">Entregas de hoy (<span id="stop-count">0</span>)</h2>
                        <button onclick="clearStops()" class="text-[10px] text-red-500 font-bold uppercase">Limpiar Ruta</button>
                    </div>
                    <ul id="stops-list" class="space-y-3"></ul>
                    <div id="empty-state" class="py-10 text-center">
                        <p class="text-slate-400 text-[11px]">No hay paradas en el recorrido actual.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="shrink-0 bg-white border-t border-slate-200 p-3 px-6 flex items-center justify-between safe-area-bottom">
            <div id="route-status" class="text-[11px] font-semibold text-slate-500 uppercase">GPS Activo</div>
            <div class="text-[9px] font-bold text-blue-700 uppercase bg-blue-50 px-2 py-1 rounded">Agenda Activa</div>
        </div>
    </div>

    <script>
        const JUNIN_COORDS = [-34.585, -60.948];
        const CITY_SUFFIX = ", Junín, Buenos Aires, Argentina";
        
        let map, originMarker = null, routeLine = null;
        let stops = JSON.parse(localStorage.getItem('stops')) || [];
        let origin = JSON.parse(localStorage.getItem('origin')) || null;
        
        // --- LA AGENDA: Dirección -> Teléfono ---
        let directory = JSON.parse(localStorage.getItem('directory')) || {};

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(JUNIN_COORDS, 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            updateDirectorySuggestions();
            if (origin) setOrigin(origin, "Cargado");
            renderStopsFromStorage();
        }

        // --- LÓGICA DE LA AGENDA ---
        function checkClientPhone(val) {
            const phoneInput = document.getElementById('phone-input');
            // Buscamos si la dirección ya tiene un teléfono guardado
            if (directory[val]) {
                phoneInput.value = directory[val];
                phoneInput.classList.add('text-blue-600', 'font-bold');
            } else {
                phoneInput.classList.remove('text-blue-600', 'font-bold');
            }
        }

        function updateDirectorySuggestions() {
            const list = document.getElementById('client-suggestions');
            list.innerHTML = '';
            Object.keys(directory).forEach(addr => {
                const opt = document.createElement('option');
                opt.value = addr;
                list.appendChild(opt);
            });
        }

        async function fetchCoord(q) {
            const cleanQ = q.toLowerCase().replace(/\s+(y|esquina|e)\s+/g, ' & ').trim();
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cleanQ + CITY_SUFFIX)}&limit=1`, {
                    headers: { 'User-Agent': 'RepartoJunin/3.0' }
                });
                const data = await response.json();
                return (data && data[0]) ? { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) } : null;
            } catch (e) { return null; }
        }

        async function searchAddress(asOrigin = false) {
            const addrInput = document.getElementById('address-input');
            const phoneInput = document.getElementById('phone-input');
            const query = addrInput.value.trim();
            const phone = phoneInput.value.trim();

            if (!query) return;

            const res = await fetchCoord(query);
            if (res) {
                map.flyTo(res, 16);
                if (asOrigin) {
                    setOrigin(res, query);
                } else {
                    // Si hay teléfono, lo guardamos o actualizamos en la agenda permanente
                    if (phone) {
                        directory[query] = phone;
                        localStorage.setItem('directory', JSON.stringify(directory));
                        updateDirectorySuggestions();
                    }
                    addStop(res, query, phone || directory[query] || "");
                }
                
                addrInput.value = '';
                phoneInput.value = '';
                updateStatus("Ubicado");
            } else {
                showToast("Dirección no encontrada");
            }
        }

        function setOrigin(latlng, label = "Inicio") {
            if (originMarker) map.removeLayer(originMarker);
            origin = latlng;
            localStorage.setItem('origin', JSON.stringify(origin));
            const redIcon = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                iconSize: [25, 41], iconAnchor: [12, 41]
            });
            originMarker = L.marker(latlng, { icon: redIcon }).addTo(map);
            document.getElementById('origin-box').classList.remove('hidden');
            document.getElementById('origin-display-text').innerText = "Inicio: " + label;
            updateRouteUI();
        }

        function addStop(latlng, label, phone) {
            const marker = L.marker(latlng).addTo(map);
            stops.push({ id: Date.now(), lat: latlng.lat, lng: latlng.lng, label: label, phone: phone, marker: marker });
            saveStops();
            updateStopsList();
            updateRouteUI();
        }

        function saveStops() {
            const data = stops.map(s => ({ id: s.id, lat: s.lat, lng: s.lng, label: s.label, phone: s.phone }));
            localStorage.setItem('stops', JSON.stringify(data));
        }

        function renderStopsFromStorage() {
            stops.forEach(s => { s.marker = L.marker([s.lat, s.lng]).addTo(map); });
            updateStopsList();
        }

        function sendWhatsApp(phone, address) {
            const message = `¡Hola! Te aviso que estoy saliendo para tu domicilio con el pedido de Yogur Griego Junín. Llego en unos minutos a ${address}.`;
            const cleanPhone = phone.replace(/\D/g, '');
            const finalPhone = cleanPhone.length <= 10 ? '549' + cleanPhone : cleanPhone;
            window.open(`https://wa.me/${finalPhone}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function updateStopsList() {
            const list = document.getElementById('stops-list');
            document.getElementById('stop-count').innerText = stops.length;
            list.innerHTML = '';
            document.getElementById('empty-state').style.display = stops.length ? 'none' : 'block';

            stops.forEach((stop, index) => {
                const li = document.createElement('li');
                li.className = "p-3 bg-white rounded-xl border border-slate-100 shadow-sm animate-fade-in";
                
                let waButton = stop.phone ? 
                    `<button onclick="sendWhatsApp('${stop.phone}', '${stop.label}')" class="bg-green-500 text-white p-2 rounded-lg active:scale-90">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </button>` : '';

                li.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <span class="shrink-0 w-6 h-6 bg-blue-600 text-white text-[10px] rounded-full flex items-center justify-center font-bold">${index + 1}</span>
                            <div class="truncate">
                                <p class="text-xs font-bold text-slate-800 truncate">${stop.label}</p>
                                ${stop.phone ? `<p class="text-[9px] text-green-600 font-bold">WA: ${stop.phone}</p>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            ${waButton}
                            <button onclick="removeStop(${stop.id})" class="text-slate-300 p-2">✕</button>
                        </div>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function optimizeRoute() {
            if (!origin || stops.length < 1) return;
            let unvisited = [...stops], ordered = [], current = origin;
            while (unvisited.length > 0) {
                let nearestIdx = 0, minDist = Infinity;
                unvisited.forEach((s, i) => {
                    const d = Math.sqrt((current.lat - s.lat)**2 + (current.lng - s.lng)**2);
                    if (d < minDist) { minDist = d; nearestIdx = i; }
                });
                ordered.push(unvisited[nearestIdx]);
                current = unvisited[nearestIdx];
                unvisited.splice(nearestIdx, 1);
            }
            stops = ordered;
            saveStops();
            updateStopsList();
            drawRoute();
        }

        function drawRoute() {
            if (routeLine) map.removeLayer(routeLine);
            const pts = [[origin.lat, origin.lng], ...stops.map(s => [s.lat, s.lng])];
            routeLine = L.polyline(pts, { color: '#2563eb', weight: 4, opacity: 0.6, dashArray: '8, 12' }).addTo(map);
            map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
            updateRouteUI(true);
        }

        function updateRouteUI(isCalc = false) {
            const div = document.getElementById('distance-info');
            if (isCalc && stops.length > 0) {
                div.classList.remove('hidden');
                let t = 0; const p = [origin, ...stops];
                for(let i=0; i<p.length-1; i++){
                    const R=6371;
                    const dLat=(p[i+1].lat-p[i].lat)*Math.PI/180;
                    const dLon=(p[i+1].lng-p[i].lng)*Math.PI/180;
                    const a=Math.sin(dLat/2)**2 + Math.cos(p[i].lat*Math.PI/180)*Math.cos(p[i+1].lat*Math.PI/180)*Math.sin(dLon/2)**2;
                    t += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                }
                document.getElementById('total-distance').innerText = t.toFixed(2) + " km";
            } else { div.classList.add('hidden'); }
        }

        function openInGoogleMaps() {
            if (!origin || !stops.length) return;
            const originStr = `${origin.lat},${origin.lng}`;
            const destStr = `${stops[stops.length-1].lat},${stops[stops.length-1].lng}`;
            const waypoints = stops.slice(0, -1).map(s => `${s.lat},${s.lng}`).join('|');
            window.open(`https://www.google.com/maps/dir/?api=1&origin=${originStr}&destination=${destStr}&waypoints=${waypoints}&travelmode=driving`, '_blank');
        }

        function removeStop(id) {
            const idx = stops.findIndex(s => s.id === id);
            if (idx !== -1) {
                if (stops[idx].marker) map.removeLayer(stops[idx].marker);
                stops.splice(idx, 1);
                saveStops();
                updateStopsList();
                updateRouteUI();
            }
        }

        function clearOrigin() {
            if (originMarker) map.removeLayer(originMarker);
            origin = null;
            localStorage.removeItem('origin');
            document.getElementById('origin-box').classList.add('hidden');
            updateRouteUI();
        }

        function clearStops() {
            stops.forEach(s => s.marker && map.removeLayer(s.marker));
            stops = [];
            localStorage.removeItem('stops');
            if (routeLine) map.removeLayer(routeLine);
            updateStopsList();
            updateRouteUI();
        }

        function updateStatus(m) { document.getElementById('route-status').innerText = m; }
        function showToast(m) {
            const t = document.createElement('div');
            t.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-2 rounded-full text-[11px] font-bold z-[5000] animate-fade-in";
            t.innerText = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function setSearchAsOrigin() { searchAddress(true); }

        window.onload = initMap;
    </script>
</body>
</html>
